version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: quantumfit
      POSTGRES_USER: quantumfit
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumfit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./quantum-fit-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://quantumfit:${DB_PASSWORD:-password123}@postgres:5432/quantumfit?schema=public&connection_limit=10
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      RESET_TOKEN_SECRET: ${RESET_TOKEN_SECRET}
      ALLOWED_ORIGINS: https://admin.quantumfit.com,https://quantumfit.com
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY}
      EXTERNAL_API_URL: ${EXTERNAL_API_URL:-https://crystal.getmifit.app}
      EXTERNAL_API_TOKEN: ${EXTERNAL_API_TOKEN}
    ports:
      - "3000:3000"

  admin:
    build: ./quantum-fit-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
